<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
  </g>

  <!-- Central MCP hub -->
  <circle cx="400" cy="200" r="52" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.9"/>
  <circle cx="400" cy="200" r="38" fill="#1e1e3a" stroke="url(#accent)" stroke-width="1.5" opacity="0.7"/>
  <!-- MCP icon: plug symbol -->
  <rect x="388" y="182" width="24" height="14" rx="3" fill="none" stroke="#818cf8" stroke-width="2"/>
  <line x1="394" y1="196" x2="394" y2="206" stroke="#818cf8" stroke-width="2"/>
  <line x1="406" y1="196" x2="406" y2="206" stroke="#818cf8" stroke-width="2"/>
  <line x1="400" y1="206" x2="400" y2="218" stroke="#818cf8" stroke-width="2.5"/>
  <circle cx="400" cy="200" r="56" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.3" stroke-dasharray="4 4"/>

  <!-- Product node (left) -->
  <g transform="translate(160, 120)">
    <circle r="30" fill="#1a1a2e" stroke="url(#green)" stroke-width="2"/>
    <rect x="-10" y="-12" width="20" height="16" rx="2" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <line x1="-6" y1="-4" x2="6" y2="-4" stroke="#34d399" stroke-width="1"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#34d399" stroke-width="1"/>
    <text y="8" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="6" opacity="0.7">PRODUCT</text>
  </g>
  <!-- Connection line -->
  <line x1="190" y1="135" x2="348" y2="188" stroke="#34d399" stroke-width="1" opacity="0.4" stroke-dasharray="6 4"/>
  <circle cx="270" cy="162" r="2" fill="#34d399" opacity="0.6"/>

  <!-- Order node (right) -->
  <g transform="translate(640, 120)">
    <circle r="30" fill="#1a1a2e" stroke="url(#amber)" stroke-width="2"/>
    <rect x="-10" y="-12" width="20" height="18" rx="2" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="-6" y1="-6" x2="6" y2="-6" stroke="#fbbf24" stroke-width="1"/>
    <polyline points="-6,-1 -2,3 6,-3" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <text y="8" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="6" opacity="0.7">ORDER</text>
  </g>
  <line x1="610" y1="135" x2="452" y2="188" stroke="#fbbf24" stroke-width="1" opacity="0.4" stroke-dasharray="6 4"/>
  <circle cx="530" cy="162" r="2" fill="#fbbf24" opacity="0.6"/>

  <!-- Assortment node (bottom-left) -->
  <g transform="translate(200, 310)">
    <circle r="26" fill="#1a1a2e" stroke="#a78bfa" stroke-width="2"/>
    <rect x="-8" y="-10" width="16" height="12" rx="2" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <rect x="-4" y="-2" width="16" height="12" rx="2" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
    <text y="8" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="5.5" opacity="0.7">ASSORTMENT</text>
  </g>
  <line x1="222" y1="296" x2="375" y2="225" stroke="#a78bfa" stroke-width="1" opacity="0.4" stroke-dasharray="6 4"/>

  <!-- Users node (bottom-right) -->
  <g transform="translate(600, 310)">
    <circle r="26" fill="#1a1a2e" stroke="#f472b6" stroke-width="2"/>
    <circle cx="0" cy="-6" r="5" fill="none" stroke="#f472b6" stroke-width="1.5"/>
    <path d="M-8,6 Q0,-2 8,6" fill="none" stroke="#f472b6" stroke-width="1.5"/>
    <text y="10" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="6" opacity="0.7">USERS</text>
  </g>
  <line x1="578" y1="296" x2="425" y2="225" stroke="#f472b6" stroke-width="1" opacity="0.4" stroke-dasharray="6 4"/>

  <!-- System node (top) -->
  <g transform="translate(400, 52)">
    <circle r="22" fill="#1a1a2e" stroke="#38bdf8" stroke-width="1.5"/>
    <circle cx="0" cy="-3" r="6" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
    <line x1="0" y1="3" x2="0" y2="8" stroke="#38bdf8" stroke-width="1.5"/>
    <text y="10" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="5.5" opacity="0.7">SYSTEM</text>
  </g>
  <line x1="400" y1="74" x2="400" y2="148" stroke="#38bdf8" stroke-width="1" opacity="0.4" stroke-dasharray="6 4"/>

  <!-- OAuth lock icon (bottom center) -->
  <g transform="translate(400, 360)">
    <rect x="-10" y="-4" width="20" height="14" rx="2" fill="#1e1e3a" stroke="#6366f1" stroke-width="1"/>
    <path d="M-5,-4 Q-5,-14 0,-14 Q5,-14 5,-4" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <circle cy="3" r="2" fill="#818cf8"/>
  </g>
  <text x="400" y="388" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="7" opacity="0.5">OAuth 2.0</text>

  <!-- Floating code fragments -->
  <g transform="translate(60, 50)" opacity="0.12">
    <text fill="#818cf8" font-family="monospace" font-size="10">server.tool(</text>
    <text y="14" fill="#818cf8" font-family="monospace" font-size="10">  'product_management',</text>
    <text y="28" fill="#818cf8" font-family="monospace" font-size="10">  ProductSchema,</text>
  </g>
  <g transform="translate(580, 240)" opacity="0.12">
    <text fill="#818cf8" font-family="monospace" font-size="10">server.resource(</text>
    <text y="14" fill="#818cf8" font-family="monospace" font-size="10">  'shop-currencies',</text>
    <text y="28" fill="#818cf8" font-family="monospace" font-size="10">  'unchained://shop',</text>
  </g>

  <!-- Ambient glow -->
  <circle cx="400" cy="200" r="120" fill="#6366f1" opacity="0.03"/>
</svg>
