<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#fb923c" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
  </g>

  <!-- Search bar -->
  <g transform="translate(200, 60)">
    <rect width="400" height="44" rx="22" fill="#1e1e3a" stroke="#f97316" stroke-width="1.5" opacity="0.9"/>
    <!-- Magnifying glass -->
    <circle cx="30" cy="22" r="8" fill="none" stroke="#fb923c" stroke-width="2"/>
    <line x1="36" y1="28" x2="42" y2="34" stroke="#fb923c" stroke-width="2" stroke-linecap="round"/>
    <!-- Search text -->
    <text x="54" y="27" fill="#9ca3af" font-family="monospace" font-size="13">Wundverband steril</text>
    <!-- Cursor blink -->
    <rect x="192" y="14" width="2" height="18" fill="#f97316" opacity="0.7"/>
  </g>

  <!-- Language flags/indicators -->
  <g transform="translate(108, 68)">
    <rect width="28" height="16" rx="3" fill="#1e1e3a" stroke="#60a5fa" stroke-width="1"/>
    <text x="14" y="12" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="9" font-weight="bold">DE</text>
  </g>
  <g transform="translate(140, 68)">
    <rect width="28" height="16" rx="3" fill="#1e1e3a" stroke="#4ade80" stroke-width="1" opacity="0.4"/>
    <text x="14" y="12" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9" opacity="0.4">FR</text>
  </g>
  <g transform="translate(172, 68)">
    <rect width="28" height="16" rx="3" fill="#1e1e3a" stroke="#f472b6" stroke-width="1" opacity="0.4"/>
    <text x="14" y="12" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="9" opacity="0.4">IT</text>
  </g>

  <!-- eDisMax query visualization -->
  <g transform="translate(100, 130)">
    <!-- Field boost bars -->
    <text x="0" y="12" fill="#f97316" font-family="monospace" font-size="9" opacity="0.6">sku_exact</text>
    <rect x="80" y="2" width="520" height="12" rx="2" fill="#f97316" opacity="0.15"/>
    <rect x="80" y="2" width="520" height="12" rx="2" fill="url(#orange)" opacity="0.7"/>
    <text x="610" y="12" fill="#fb923c" font-family="monospace" font-size="8">^1000</text>

    <text x="0" y="32" fill="#f97316" font-family="monospace" font-size="9" opacity="0.6">sku</text>
    <rect x="80" y="22" width="520" height="12" rx="2" fill="#f97316" opacity="0.15"/>
    <rect x="80" y="22" width="52" height="12" rx="2" fill="url(#orange)" opacity="0.55"/>
    <text x="610" y="32" fill="#fb923c" font-family="monospace" font-size="8">^100</text>

    <text x="0" y="52" fill="#3b82f6" font-family="monospace" font-size="9" opacity="0.6">gtin_s</text>
    <rect x="80" y="42" width="520" height="12" rx="2" fill="#3b82f6" opacity="0.15"/>
    <rect x="80" y="42" width="47" height="12" rx="2" fill="url(#blue)" opacity="0.55"/>
    <text x="610" y="52" fill="#60a5fa" font-family="monospace" font-size="8">^90</text>

    <text x="0" y="72" fill="#a78bfa" font-family="monospace" font-size="9" opacity="0.6">title_${lang}</text>
    <rect x="80" y="62" width="520" height="12" rx="2" fill="#a78bfa" opacity="0.15"/>
    <rect x="80" y="62" width="6" height="12" rx="2" fill="#a78bfa" opacity="0.55"/>
    <text x="610" y="72" fill="#a78bfa" font-family="monospace" font-size="8">^10</text>

    <text x="0" y="92" fill="#6366f1" font-family="monospace" font-size="9" opacity="0.6">desc_${lang}</text>
    <rect x="80" y="82" width="520" height="12" rx="2" fill="#6366f1" opacity="0.15"/>
    <rect x="80" y="82" width="2" height="12" rx="1" fill="#6366f1" opacity="0.55"/>
    <text x="610" y="92" fill="#6366f1" font-family="monospace" font-size="8">^2</text>
  </g>

  <!-- eDisMax label -->
  <text x="400" y="250" text-anchor="middle" fill="#f97316" font-family="monospace" font-size="11" letter-spacing="3" opacity="0.3">eDisMax Field Boosting</text>

  <!-- Barcode section (bottom-left) -->
  <g transform="translate(80, 275)">
    <text x="0" y="12" fill="#9ca3af" font-family="monospace" font-size="9" opacity="0.5">BARCODE SCAN</text>
    <!-- Barcode lines -->
    <g transform="translate(0, 20)">
      <rect x="0" width="3" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="5" width="1" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="8" width="3" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="13" width="1" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="16" width="2" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="20" width="3" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="25" width="1" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="28" width="2" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="32" width="3" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="37" width="1" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="40" width="2" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="44" width="3" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="49" width="1" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="52" width="2" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="56" width="3" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="61" width="1" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="64" width="3" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="69" width="2" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="73" width="1" height="40" fill="#fb923c" opacity="0.6"/>
      <rect x="76" width="3" height="40" fill="#fb923c" opacity="0.6"/>
    </g>
    <text x="40" y="72" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="8">7680123456789</text>
  </g>

  <!-- Arrow from barcode to results -->
  <line x1="170" y1="320" x2="280" y2="320" stroke="#fb923c" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>
  <polygon points="280,316 290,320 280,324" fill="#fb923c" opacity="0.3"/>

  <!-- Auto-suggest dropdown -->
  <g transform="translate(300, 275)">
    <text x="0" y="12" fill="#9ca3af" font-family="monospace" font-size="9" opacity="0.5">AUTO-SUGGEST</text>
    <rect y="18" width="200" height="24" rx="4" fill="#1e1e3a" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
    <text x="10" y="35" fill="#60a5fa" font-family="monospace" font-size="10">Bandage steril 10x20</text>
    <rect y="44" width="200" height="24" rx="4" fill="#1e1e3a" stroke="#3b82f6" stroke-width="0.5" opacity="0.4"/>
    <text x="10" y="61" fill="#60a5fa" font-family="monospace" font-size="10" opacity="0.5">Bandage elastisch 8cm</text>
    <rect y="70" width="200" height="24" rx="4" fill="#1e1e3a" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
    <text x="10" y="87" fill="#60a5fa" font-family="monospace" font-size="10" opacity="0.3">Band-Aid 3M+ Premium</text>
  </g>

  <!-- Solr icon (bottom right) -->
  <g transform="translate(620, 290)">
    <text x="0" y="12" fill="#9ca3af" font-family="monospace" font-size="9" opacity="0.5">INDEXING</text>
    <!-- Document stack -->
    <rect x="10" y="22" width="100" height="14" rx="3" fill="#1e1e3a" stroke="#4ade80" stroke-width="1" opacity="0.3"/>
    <rect x="6" y="40" width="100" height="14" rx="3" fill="#1e1e3a" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
    <rect x="2" y="58" width="100" height="14" rx="3" fill="#1e1e3a" stroke="#4ade80" stroke-width="1" opacity="0.7"/>
    <text x="52" y="68" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">batch: 250</text>
    <!-- Arrow down -->
    <line x1="52" y1="76" x2="52" y2="90" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
    <polygon points="48,88 52,96 56,88" fill="#4ade80" opacity="0.5"/>
  </g>

  <!-- Ambient glow -->
  <circle cx="400" cy="80" r="150" fill="#f97316" opacity="0.02"/>
  <circle cx="400" cy="300" r="200" fill="#3b82f6" opacity="0.015"/>
</svg>
