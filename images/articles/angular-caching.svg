<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dd0031"/>
      <stop offset="100%" stop-color="#f06292"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#dd0031" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
  </g>

  <!-- Angular shield -->
  <g transform="translate(400, 85)">
    <path d="M0,-50 L50,-30 L42,30 L0,50 L-42,30 L-50,-30 Z" fill="none" stroke="#dd0031" stroke-width="2" opacity="0.8"/>
    <path d="M0,-35 L-8,-14 L8,-14 Z" fill="#dd0031" opacity="0.7"/>
    <rect x="-10" y="-10" width="20" height="5" rx="1" fill="#dd0031" opacity="0.5"/>
  </g>

  <!-- Request flow -->
  <!-- Component box -->
  <g transform="translate(80, 180)">
    <rect width="120" height="50" rx="6" fill="#1e1e3a" stroke="#dd0031" stroke-width="1.5"/>
    <text x="60" y="20" text-anchor="middle" fill="#f06292" font-family="monospace" font-size="9">Component</text>
    <text x="60" y="35" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="8">getData()</text>
  </g>

  <!-- Arrow to cache -->
  <line x1="200" y1="205" x2="280" y2="205" stroke="#dd0031" stroke-width="1.5" opacity="0.5"/>
  <polygon points="278,200 290,205 278,210" fill="#dd0031" opacity="0.5"/>

  <!-- Cache layer (diamond shape) -->
  <g transform="translate(350, 205)">
    <path d="M0,-35 L60,0 L0,35 L-60,0 Z" fill="#1e1e3a" stroke="#fbbf24" stroke-width="1.5"/>
    <text y="-5" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10">Cache</text>
    <text y="10" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="8">HIT / MISS</text>
  </g>

  <!-- Cache HIT path (fast, green) -->
  <g>
    <text x="350" y="150" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9" opacity="0.6">HIT (instant)</text>
    <path d="M350,170 Q350,160 280,175 L200,195" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.5" stroke-dasharray="5 3"/>
    <polygon points="204,190 196,195 204,200" fill="#4ade80" opacity="0.5"/>
  </g>

  <!-- Cache MISS path -->
  <line x1="410" y1="205" x2="510" y2="205" stroke="#dd0031" stroke-width="1" opacity="0.4" stroke-dasharray="5 3"/>
  <polygon points="508,200 520,205 508,210" fill="#dd0031" opacity="0.4"/>
  <text x="465" y="195" text-anchor="middle" fill="#dd0031" font-family="monospace" font-size="8" opacity="0.5">MISS</text>

  <!-- HTTP Service -->
  <g transform="translate(520, 180)">
    <rect width="120" height="50" rx="6" fill="#1e1e3a" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="60" y="20" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="9">HttpClient</text>
    <text x="60" y="35" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="8">GET /api/data</text>
  </g>

  <!-- Arrow to server -->
  <line x1="640" y1="205" x2="690" y2="205" stroke="#60a5fa" stroke-width="1" opacity="0.4" stroke-dasharray="5 3"/>
  <polygon points="688,200 700,205 688,210" fill="#60a5fa" opacity="0.4"/>

  <!-- Server -->
  <g transform="translate(700, 185)">
    <rect width="60" height="40" rx="4" fill="#1e1e3a" stroke="#6366f1" stroke-width="1"/>
    <text x="30" y="16" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="8">API</text>
    <circle cx="20" cy="28" r="3" fill="#4ade80" opacity="0.5"/>
    <circle cx="30" cy="28" r="3" fill="#fbbf24" opacity="0.5"/>
    <circle cx="40" cy="28" r="3" fill="#dd0031" opacity="0.5"/>
  </g>

  <!-- Performance metrics -->
  <g transform="translate(120, 290)">
    <text x="0" y="0" fill="#9ca3af" font-family="monospace" font-size="9" opacity="0.5">BEFORE</text>
    <rect x="0" y="8" width="200" height="8" rx="2" fill="#dd0031" opacity="0.2"/>
    <rect x="0" y="8" width="200" height="8" rx="2" fill="#dd0031" opacity="0.5"/>
    <text x="210" y="16" fill="#dd0031" font-family="monospace" font-size="9">420ms</text>
  </g>
  <g transform="translate(120, 325)">
    <text x="0" y="0" fill="#9ca3af" font-family="monospace" font-size="9" opacity="0.5">AFTER</text>
    <rect x="0" y="8" width="200" height="8" rx="2" fill="#4ade80" opacity="0.2"/>
    <rect x="0" y="8" width="24" height="8" rx="2" fill="#4ade80" opacity="0.7"/>
    <text x="34" y="16" fill="#4ade80" font-family="monospace" font-size="9">~5ms (cached)</text>
  </g>

  <!-- Speed improvement badge -->
  <g transform="translate(520, 300)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="#1e1e3a" stroke="#4ade80" stroke-width="1" opacity="0.6"/>
    <text x="80" y="22" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="22" font-weight="bold">84x</text>
    <text x="80" y="40" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="9">faster response</text>
  </g>

  <!-- Ambient glow -->
  <circle cx="350" cy="205" r="130" fill="#fbbf24" opacity="0.02"/>
  <circle cx="400" cy="85" r="80" fill="#dd0031" opacity="0.03"/>
</svg>
