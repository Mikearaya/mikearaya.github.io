<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#2dd4bf" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
  </g>

  <!-- Network nodes in hexagonal layout -->

  <!-- Center node (Orderer) -->
  <g transform="translate(400, 200)">
    <path d="M0,-44 L38,-22 L38,22 L0,44 L-38,22 L-38,-22 Z" fill="#1e1e3a" stroke="url(#teal)" stroke-width="2"/>
    <text y="-5" text-anchor="middle" fill="#2dd4bf" font-family="monospace" font-size="10" font-weight="bold">ORDERER</text>
    <text y="10" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="8">consensus</text>
  </g>

  <!-- Peer 0 (top-left) -->
  <g transform="translate(180, 100)">
    <path d="M0,-36 L31,-18 L31,18 L0,36 L-31,18 L-31,-18 Z" fill="#1e1e3a" stroke="#2dd4bf" stroke-width="1.5"/>
    <text y="-5" text-anchor="middle" fill="#2dd4bf" font-family="monospace" font-size="9">PEER 0</text>
    <text y="10" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="7">Org1MSP</text>
    <!-- Ledger icon -->
    <rect x="-8" y="16" width="16" height="10" rx="2" fill="none" stroke="#2dd4bf" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Peer 1 (top-right) -->
  <g transform="translate(620, 100)">
    <path d="M0,-36 L31,-18 L31,18 L0,36 L-31,18 L-31,-18 Z" fill="#1e1e3a" stroke="#60a5fa" stroke-width="1.5"/>
    <text y="-5" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="9">PEER 1</text>
    <text y="10" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="7">Org1MSP</text>
    <rect x="-8" y="16" width="16" height="10" rx="2" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Peer 2 (bottom-left) -->
  <g transform="translate(180, 300)">
    <path d="M0,-36 L31,-18 L31,18 L0,36 L-31,18 L-31,-18 Z" fill="#1e1e3a" stroke="#a78bfa" stroke-width="1.5"/>
    <text y="-5" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="9">PEER 2</text>
    <text y="10" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="7">Org1MSP</text>
    <rect x="-8" y="16" width="16" height="10" rx="2" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Peer 3 (bottom-right) -->
  <g transform="translate(620, 300)">
    <path d="M0,-36 L31,-18 L31,18 L0,36 L-31,18 L-31,-18 Z" fill="#1e1e3a" stroke="#f472b6" stroke-width="1.5"/>
    <text y="-5" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="9">PEER 3</text>
    <text y="10" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="7">Org1MSP</text>
    <rect x="-8" y="16" width="16" height="10" rx="2" fill="none" stroke="#f472b6" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Connection lines -->
  <!-- Center to peers -->
  <line x1="362" y1="180" x2="211" y2="120" stroke="#2dd4bf" stroke-width="1" opacity="0.3" stroke-dasharray="6 4"/>
  <line x1="438" y1="180" x2="589" y2="120" stroke="#60a5fa" stroke-width="1" opacity="0.3" stroke-dasharray="6 4"/>
  <line x1="362" y1="220" x2="211" y2="280" stroke="#a78bfa" stroke-width="1" opacity="0.3" stroke-dasharray="6 4"/>
  <line x1="438" y1="220" x2="589" y2="280" stroke="#f472b6" stroke-width="1" opacity="0.3" stroke-dasharray="6 4"/>
  <!-- Peer-to-peer gossip -->
  <line x1="211" y1="100" x2="589" y2="100" stroke="#9ca3af" stroke-width="0.5" opacity="0.15" stroke-dasharray="3 5"/>
  <line x1="211" y1="300" x2="589" y2="300" stroke="#9ca3af" stroke-width="0.5" opacity="0.15" stroke-dasharray="3 5"/>
  <line x1="180" y1="136" x2="180" y2="264" stroke="#9ca3af" stroke-width="0.5" opacity="0.15" stroke-dasharray="3 5"/>
  <line x1="620" y1="136" x2="620" y2="264" stroke="#9ca3af" stroke-width="0.5" opacity="0.15" stroke-dasharray="3 5"/>

  <!-- Data packets on lines -->
  <circle cx="286" cy="150" r="3" fill="#2dd4bf" opacity="0.5"/>
  <circle cx="510" cy="150" r="3" fill="#60a5fa" opacity="0.5"/>
  <circle cx="286" cy="250" r="3" fill="#a78bfa" opacity="0.5"/>
  <circle cx="510" cy="250" r="3" fill="#f472b6" opacity="0.5"/>

  <!-- Channel label -->
  <g transform="translate(350, 365)">
    <rect width="100" height="22" rx="11" fill="#1e1e3a" stroke="#2dd4bf" stroke-width="1" opacity="0.5"/>
    <text x="50" y="15" text-anchor="middle" fill="#2dd4bf" font-family="monospace" font-size="9">mychannel</text>
  </g>

  <!-- CA certificate (top center) -->
  <g transform="translate(370, 30)">
    <rect width="60" height="34" rx="4" fill="#1e1e3a" stroke="#fbbf24" stroke-width="1" opacity="0.6"/>
    <text x="30" y="15" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8">CA</text>
    <text x="30" y="27" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="7">x509</text>
  </g>

  <!-- Chaincode / Smart Contract (right side) -->
  <g transform="translate(720, 190)">
    <rect width="70" height="50" rx="6" fill="#1e1e3a" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
    <text x="35" y="20" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8">Chaincode</text>
    <text x="35" y="35" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="7">Go / Node</text>
  </g>
  <line x1="660" y1="200" x2="718" y2="210" stroke="#fbbf24" stroke-width="0.8" opacity="0.3" stroke-dasharray="4 3"/>

  <!-- Block diagram (left side) -->
  <g transform="translate(20, 170)">
    <rect width="55" height="20" rx="3" fill="#1e1e3a" stroke="#2dd4bf" stroke-width="0.8" opacity="0.4"/>
    <text x="28" y="14" text-anchor="middle" fill="#2dd4bf" font-family="monospace" font-size="7" opacity="0.6">Block N-1</text>

    <rect y="24" width="55" height="20" rx="3" fill="#1e1e3a" stroke="#2dd4bf" stroke-width="0.8" opacity="0.6"/>
    <text x="28" y="38" text-anchor="middle" fill="#2dd4bf" font-family="monospace" font-size="7" opacity="0.8">Block N</text>

    <rect y="48" width="55" height="20" rx="3" fill="#1e1e3a" stroke="#2dd4bf" stroke-width="1"/>
    <text x="28" y="62" text-anchor="middle" fill="#2dd4bf" font-family="monospace" font-size="7">Block N+1</text>

    <!-- Chain links -->
    <line x1="28" y1="20" x2="28" y2="24" stroke="#2dd4bf" stroke-width="1" opacity="0.5"/>
    <line x1="28" y1="44" x2="28" y2="48" stroke="#2dd4bf" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Ambient glow -->
  <circle cx="400" cy="200" r="180" fill="#2dd4bf" opacity="0.02"/>
</svg>
